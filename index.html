<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブラックジャック</title>
</head>
<body>
    <h1>ブラックジャック</h1>

    <div id="cpu-area">
        <h2>CPU</h2>
        <div id="cpu-cards"></div>
        <p>スコア：<span id="cpu-score">?</span></p>
    </div>

    <div id="player-area">
        <h2>あなた</h2>
        <div id="player-cards"></div>
        <p>スコア：<span id="player-score">0</span></p>
    </div>
    <div id="controls">
        <button id="hit-btn">ヒット</button>
        <button id="stand-btn">スタンド</button>
        <button id="reset-btn">リセット</button>
    </div>

    <p id="message"></p>

    <script src="script.js"></script>  

    <link rel="stylesheet" href="style.css">
</body>
</html>
